name: Terraform Phase 2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  terraform:
    name: Infrastructure Provisioning
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Restore state from previous run so Terraform knows what already exists
      - name: Restore Terraform state cache
        uses: actions/cache/restore@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.run_id }}
          restore-keys: terraform-state-

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="aws_region=${{ secrets.AWS_REGION || 'us-east-1' }}"
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="aws_region=${{ secrets.AWS_REGION || 'us-east-1' }}"

      - name: Show outputs
        run: terraform output

      # Save updated state for the next run
      - name: Save Terraform state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.run_id }}

name: Phase 3 - ECS Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Docker, Push ECR, Deploy ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Wait for ECR repository to be ready
        run: |
          echo "Waiting for ECR repository..."
          for i in $(seq 1 12); do
            if aws ecr describe-repositories \
              --repository-names shopsmart-backend \
              --region ${{ secrets.AWS_REGION || 'us-east-1' }} > /dev/null 2>&1; then
              echo "ECR repository is ready"
              break
            fi
            echo "Attempt $i/12 - retrying in 30s..."
            sleep 30
          done

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/shopsmart-backend:$IMAGE_TAG \
            -t $ECR_REGISTRY/shopsmart-backend:latest \
            ./server
          docker push $ECR_REGISTRY/shopsmart-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/shopsmart-backend:latest
          echo "image=$ECR_REGISTRY/shopsmart-backend:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to ECS Fargate
        run: |
          aws ecs update-service \
            --cluster shopsmart-cluster \
            --service shopsmart-backend \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Verify service is running
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster shopsmart-cluster \
            --services shopsmart-backend \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }}

          echo "Service status:"
          aws ecs describe-services \
            --cluster shopsmart-cluster \
            --services shopsmart-backend \
            --region ${{ secrets.AWS_REGION || 'us-east-1' }} \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount}' \
            --output table

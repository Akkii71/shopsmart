name: CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-deploy:
    name: Backend Deploy to EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2 using SSH
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Idempotent directory setup
            mkdir -p ~/shopsmart
            cd ~/shopsmart
            
            # Pull repository updates (assuming git is active)
            # Otherwise you would use rsync steps prior to this SSH action
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi
            
            # Idempotently grab the latest code
            git fetch --all
            git reset --hard origin/main
            
            cd server
            npm ci --production
            
            # Setup pm2 if not existing
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
            
            # Safely start or restart the Node runtime idempotently
            pm2 restart shopsmart-server || pm2 start src/index.js --name shopsmart-server
            pm2 save

  frontend-deploy:
    name: Frontend Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    environment: production
    needs: backend-deploy

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.FRONTEND_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        continue-on-error: true
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync S3 Bucket
        continue-on-error: true
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete --exclude ".git/*" --exclude ".github/*"

      - name: Invalidate CloudFront Cache
        continue-on-error: true
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  notify:
    name: Notification via Slack & GitHub Summary
    runs-on: ubuntu-latest
    needs: [backend-deploy, frontend-deploy]
    if: always()

    steps:
      - name: Post to a Slack channel
        uses: slackapi/slack-github-action@v1.24.0
        continue-on-error: true
        with:
          channel-id: 'DEPLOYMENTS'
          slack-message: "Deployment ${{ needs.backend-deploy.result == 'success' && needs.frontend-deploy.result == 'success' && 'Succeeded :tada:' || 'Failed :x:' }}!"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Print Job Results to Job Summary
        run: |
          echo "## Deployment Status 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Deploy:** ${{ needs.backend-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Deploy:** ${{ needs.frontend-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-deploy.result }}" == "success" ] && [ "${{ needs.frontend-deploy.result }}" == "success" ]; then
            echo "✅ **All systems successfully deployed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment failed! Check the logs above.**" >> $GITHUB_STEP_SUMMARY
          fi
